






<!-- Defines the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element, language set to English -->
<html lang="en">
    <!-- Head section contains metadata, settings, and page information -->
    <head>
        <!-- Sets the character encoding to UTF-8 (supports most characters) -->
        <meta charset="UTF-8">
        <!-- Makes the webpage responsive on different screen sizes (mobile-friendly) -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Title shown in the browser tab -->
        <title>Dog Image</title>
    </head>


    <!-- Body section contains all visible content on the webpage -->
    <body>
        <!-- Displays the selected dog breed centered and styled in blue -->
        <h1 style="text-align:center; color: blue;">{{ dog_breed }}</h1>
        <!-- Displays instructions or messages centered in green text -->
        <p style="text-align:center; color:green;">{{ instructions }}</p>
        <!-- Displays the dog image centered on the page with fixed size -->
        <img src="{{dog_image}}" alt="{{image_description}}" style="width:400px; height:400px; display:block; margin:0 auto;">

    </body>

</html>

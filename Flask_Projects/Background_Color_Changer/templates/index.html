<!-- Name: Ryan Pereira -->
<!-- Project Name: Background Color Changer -->
<!-- Description: A Flask web application that changes the background color of a webpage based on a color name provided in the URL. -->
<!-- Module Name: index.html -->
<!-- Module Purpose: This template displays the color name and dynamically changes the background color using values passed from the Flask backend. -->
<!-- Collaborators: None -->
<!-- Sources: Github Copilot, Stack Overflow, ChatGPT, Python documentation -->
<!-- Date: 4/19/2026 -->
<!-- Last Modified: 4/21/2026 -->






<!-- Defines the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element, language set to English -->
<html lang="en">
    <!-- Head section contains metadata and page settings -->
    <head>
        <!-- Sets character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Title shown in browser tab -->
        <title>Background Color</title>
    </head>


    <!-- Body section contains visible page content -->
    <body style="background-color: {{ background_color or 'white' }}">
        <!-- Displays the name of the selected color centered on the page -->
        <h1 style="text-align:center">{{ color_name }}</h1>
        <!-- Displays instruction or message text centered on the page -->
        <p style="text-align:center">{{ instruction }}</p>
    </body>
</html>
